{% extends "base.html" %}
{% block title %}3D Modell{% endblock %}
{% block content %}

<div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="mb-0"><i class="bi bi-box me-2"></i>3D Modell Viewer</h4>
    <label for="ifc-input" class="btn btn-danger mb-0">
        <i class="bi bi-upload me-1"></i> Datei laden
    </label>
    <input type="file" id="ifc-input" accept=".ifc,.obj,.stl,.gltf,.glb,.fbx,.3ds,.dae,.ply,.off" style="display:none">
</div>

<div class="card p-0" style="overflow:hidden;">
    <div id="viewer_container" style="width:100%; height:78vh; position:relative; background:#1a1a2e; border-radius:10px;">

        <div id="viewer" style="width:100%; height:100%;"></div>

        <div id="hint" style="position:absolute; inset:0; display:flex; align-items:center; justify-content:center; flex-direction:column; color:#888; text-align:center; pointer-events:none;">
            <i class="bi bi-box" style="font-size:4rem; color:#444;"></i>
            <div class="mt-3" style="font-size:1.05rem;">IFC oder andere 3D-Datei laden</div>
            <div class="small mt-1" style="color:#555;">Unterstuetzte Formate: .ifc, .obj, .stl, .gltf, .glb, .fbx, .3ds, .dae, .ply</div>
            <div class="small mt-1" style="color:#555;">Drag &amp; Drop hier hinein oder Schaltflaeche oben rechts</div>
        </div>

    </div>
</div>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/online-3d-viewer@0.8.18/build/o3dv.min.css">
<script src="https://cdn.jsdelivr.net/npm/online-3d-viewer@0.8.18/build/o3dv.min.js"></script>

<script>
var viewer = null;

window.addEventListener('load', function () {
    OV.SetExternalLibLocation('https://cdn.jsdelivr.net/npm/online-3d-viewer@0.8.18/build/');
    var container = document.getElementById('viewer');
    viewer = new OV.EmbedViewer(container, {
        backgroundColor: new OV.RGBAColor(26, 26, 46, 255),
        defaultColor: new OV.RGBColor(200, 200, 200),
        edgeSettings: new OV.EdgeSettings(false, new OV.RGBColor(0, 0, 0), 1)
    });
});

function ladeDatei(files) {
    if (!viewer || files.length === 0) return;
    document.getElementById('hint').style.display = 'none';
    viewer.LoadModelFromFileList(files);
}

document.getElementById('ifc-input').addEventListener('change', function (e) {
    ladeDatei(e.target.files);
});

var container = document.getElementById('viewer_container');
container.addEventListener('dragover', function (e) {
    e.preventDefault();
    e.stopPropagation();
});
container.addEventListener('drop', function (e) {
    e.preventDefault();
    e.stopPropagation();
    if (e.dataTransfer.files.length > 0) {
        ladeDatei(e.dataTransfer.files);
    }
});
</script>

{% endblock %}
