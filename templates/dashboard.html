{% extends "base.html" %}
{% block title %}Start{% endblock %}
{% block content %}

<div class="row g-3" style="min-height: calc(100vh - 80px);">

    <!-- LINKS: IFC Viewer -->
    <div class="col-12 col-lg-8">
        <div class="card h-100 p-0" style="overflow:hidden; min-height: 460px;">
            <div class="card-header d-flex justify-content-between align-items-center">
                <span class="fw-semibold"><i class="bi bi-box me-1"></i> 3D Modell Viewer</span>
                <div class="d-flex gap-2">
                    <label for="ifc-dash-input" class="btn btn-sm btn-danger mb-0">
                        <i class="bi bi-upload me-1"></i> Datei laden
                    </label>
                    <a href="{{ url_for('modell') }}" class="btn btn-sm btn-outline-secondary mb-0" title="Vollbild">
                        <i class="bi bi-fullscreen"></i>
                    </a>
                </div>
                <input type="file" id="ifc-dash-input" accept=".ifc,.obj,.stl,.gltf,.glb,.fbx,.3ds,.dae,.ply,.off" style="display:none">
            </div>
            <div id="dash-viewer-wrap" style="height: calc(100% - 54px); min-height: 420px; background:#1a2d3d; position:relative;">
                <div id="dash-viewer" style="width:100%; height:100%;"></div>
                <div id="dash-hint" style="position:absolute; inset:0; display:flex; align-items:center; justify-content:center; flex-direction:column; color:#556; text-align:center; pointer-events:none;">
                    <i class="bi bi-box" style="font-size:3.5rem; color:#3a5068;"></i>
                    <div class="mt-2" style="font-size:0.95rem; color:#4a6070;">IFC oder 3D-Datei laden</div>
                    <div class="small mt-1" style="color:#3a5060;">Drag &amp; Drop oder Schaltflaeche oben</div>
                    <div class="small mt-1" style="color:#2a4050;">IFC &middot; OBJ &middot; STL &middot; GLTF &middot; FBX &middot; ...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- RECHTS: Kategorie-Buttons -->
    <div class="col-12 col-lg-4 d-flex flex-column gap-3">

        <div class="row g-3 flex-grow-1">
            <div class="col-6 col-lg-12">
                <a href="#" class="haupt-btn w-100 d-flex flex-column align-items-center justify-content-center gap-2 py-4 text-decoration-none">
                    <i class="bi bi-building" style="font-size:2.5rem;"></i>
                    <span class="fw-bold" style="font-size:1rem;">Baumanagement</span>
                    <span class="small" style="opacity:0.6; font-weight:400;">Demnächst</span>
                </a>
            </div>
            <div class="col-6 col-lg-12">
                <a href="{{ url_for('baulogistik') }}" class="haupt-btn haupt-btn-aktiv w-100 d-flex flex-column align-items-center justify-content-center gap-2 py-4 text-decoration-none">
                    <i class="bi bi-boxes" style="font-size:2.5rem;"></i>
                    <span class="fw-bold" style="font-size:1rem;">Baulogistik</span>
                    <span class="small" style="opacity:0.75; font-weight:400;">Kran &middot; Parking &middot; mehr</span>
                </a>
            </div>
        </div>

    </div>
</div>

<!-- Online3DViewer -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/online-3d-viewer@0.8.18/build/o3dv.min.css">
<script src="https://cdn.jsdelivr.net/npm/online-3d-viewer@0.8.18/build/o3dv.min.js"></script>

<script>
var dashViewer = null;

window.addEventListener('load', function () {
    OV.SetExternalLibLocation('https://cdn.jsdelivr.net/npm/online-3d-viewer@0.8.18/build/');
    var container = document.getElementById('dash-viewer');
    dashViewer = new OV.EmbedViewer(container, {
        backgroundColor: new OV.RGBAColor(26, 45, 61, 255),
        defaultColor: new OV.RGBColor(180, 200, 210),
        edgeSettings: new OV.EdgeSettings(false, new OV.RGBColor(0, 0, 0), 1)
    });
});

function ladeDashDatei(files) {
    if (!dashViewer || files.length === 0) return;
    document.getElementById('dash-hint').style.display = 'none';
    dashViewer.LoadModelFromFileList(files);
}

document.getElementById('ifc-dash-input').addEventListener('change', function (e) {
    ladeDashDatei(e.target.files);
});

var dropZone = document.getElementById('dash-viewer-wrap');
dropZone.addEventListener('dragover', function (e) { e.preventDefault(); e.stopPropagation(); });
dropZone.addEventListener('drop', function (e) {
    e.preventDefault(); e.stopPropagation();
    if (e.dataTransfer.files.length > 0) ladeDashDatei(e.dataTransfer.files);
});
</script>

{% endblock %}
